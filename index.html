<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DiscoPass — Admin</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;700;900&family=Syne:wght@400;500;600&display=swap');
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #060608; --s1: #0f0f14; --s2: #17171f; --s3: #1f1f2a; --s4: #2a2a38;
  --lime: #d4ff00; --pink: #ff2d6b; --white: #f5f5f0;
  --muted: #5a5a6e; --muted2: #8888a0;
  --success: #00e5a0; --warning: #ffaa00;
  --r: 14px; --rl: 22px;
}
html, body { height: 100%; }
body { font-family: 'Syne', sans-serif; background: var(--bg); color: var(--white); min-height: 100vh; overflow-x: hidden; }
body::before {
  content: ''; position: fixed; inset: 0;
  background-image: linear-gradient(rgba(212,255,0,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(212,255,0,0.025) 1px, transparent 1px);
  background-size: 48px 48px; pointer-events: none; z-index: 0;
}

/* ── SCREENS ── */
.screen { display: none; min-height: 100vh; position: relative; z-index: 1; }
.screen.active { display: flex; flex-direction: column; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
.fadein { animation: fadeUp 0.3s ease both; }

/* ── LOGIN ── */
#s-login { align-items: center; justify-content: center; padding: 40px 24px; }
.login-box { width: 100%; max-width: 380px; display: flex; flex-direction: column; align-items: center; }
.wordmark { font-family: 'Unbounded', sans-serif; font-weight: 900; font-size: 14px; letter-spacing: 5px; color: var(--lime); margin-bottom: 8px; }
.wordmark span { color: var(--pink); }
.admin-chip { font-family: 'Unbounded', sans-serif; font-size: 8px; letter-spacing: 3px; color: var(--muted2); border: 1px solid var(--s3); padding: 4px 14px; border-radius: 40px; margin-bottom: 48px; text-transform: uppercase; }
.login-title { font-family: 'Unbounded', sans-serif; font-weight: 700; font-size: 30px; letter-spacing: -0.5px; margin-bottom: 8px; text-align: center; }
.login-sub { font-size: 13px; color: var(--muted2); text-align: center; margin-bottom: 36px; line-height: 1.6; }
.form-label { display: block; font-family: 'Unbounded', sans-serif; font-size: 8px; letter-spacing: 2.5px; color: var(--muted2); text-transform: uppercase; margin-bottom: 10px; }
.form-input {
  width: 100%; background: var(--s1); border: 1px solid var(--s3); color: var(--white);
  padding: 16px 18px; border-radius: var(--r); font-family: 'Syne', sans-serif; font-size: 16px;
  outline: none; transition: border-color 0.2s, box-shadow 0.2s; margin-bottom: 12px;
  -webkit-text-fill-color: var(--white);
}
.form-input:focus { border-color: var(--lime); box-shadow: 0 0 0 3px rgba(212,255,0,0.08); }
.form-input::placeholder { color: var(--muted); }

/* ── BUTTONS ── */
.btn {
  width: 100%; padding: 16px; border-radius: var(--rl); border: none;
  font-family: 'Unbounded', sans-serif; font-size: 11px; font-weight: 700;
  letter-spacing: 2px; cursor: pointer; text-transform: uppercase;
  transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s;
}
.btn:hover { transform: translateY(-1px); }
.btn:active { transform: translateY(0); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.btn-lime { background: var(--lime); color: #000; }
.btn-lime:hover:not(:disabled) { box-shadow: 0 8px 28px rgba(212,255,0,0.2); }
.btn-outline { background: transparent; color: var(--white); border: 1px solid var(--s3); margin-top: 10px; }
.btn-outline:hover { border-color: var(--muted); }
.btn-danger { background: transparent; color: var(--pink); border: 1px solid rgba(255,45,107,0.35); }
.btn-danger:hover { background: rgba(255,45,107,0.08); }
.btn-sm { width: auto; padding: 8px 16px; font-size: 9px; letter-spacing: 1.5px; margin-top: 0; }
.login-error { color: var(--pink); font-size: 12px; text-align: center; margin-top: 10px; min-height: 18px; font-family: 'Syne', sans-serif; }

.shake { animation: shake 0.35s ease; }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }

/* ── HEADER ── */
.admin-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 24px; border-bottom: 1px solid var(--s3);
  background: rgba(6,6,8,0.97); backdrop-filter: blur(12px);
  position: sticky; top: 0; z-index: 50;
}
.header-logo { font-family: 'Unbounded', sans-serif; font-weight: 900; font-size: 13px; letter-spacing: 4px; color: var(--lime); }
.header-logo span { color: var(--pink); }
.header-right { display: flex; align-items: center; gap: 12px; }
#live-count { font-family: 'Unbounded', sans-serif; font-size: 9px; letter-spacing: 1.5px; color: var(--muted2); }
.logout-btn {
  background: transparent; border: 1px solid var(--s3); color: var(--muted2);
  font-family: 'Unbounded', sans-serif; font-size: 8px; letter-spacing: 2px;
  padding: 8px 14px; border-radius: 40px; cursor: pointer; transition: all 0.2s;
}
.logout-btn:hover { color: var(--white); border-color: var(--muted); }

/* ── TABS ── */
.tabs { display: flex; border-bottom: 1px solid var(--s3); background: var(--s1); padding: 0 24px; }
.tab {
  font-family: 'Unbounded', sans-serif; font-size: 9px; letter-spacing: 2px;
  padding: 16px 20px; cursor: pointer; color: var(--muted);
  border: none; border-bottom: 2px solid transparent;
  background: none; text-transform: uppercase; transition: all 0.2s;
}
.tab:hover { color: var(--white); }
.tab.active { color: var(--lime); border-bottom-color: var(--lime); }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ── SCAN PANEL ── */
.scan-panel { padding: 28px 24px; max-width: 560px; margin: 0 auto; }
.section-title { font-family: 'Unbounded', sans-serif; font-size: 10px; letter-spacing: 2.5px; color: var(--muted2); text-transform: uppercase; margin-bottom: 14px; }
.or { display: flex; align-items: center; gap: 12px; margin: 20px 0; color: var(--muted); font-size: 11px; letter-spacing: 2px; font-family: 'Unbounded', sans-serif; }
.or::before, .or::after { content: ''; flex: 1; height: 1px; background: var(--s3); }
.manual-row { display: flex; gap: 10px; }
.manual-row .form-input { flex: 1; margin-bottom: 0; font-family: 'Unbounded', sans-serif; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; }

/* ── CAMERA ── */
.camera-wrap {
  width: 100%; aspect-ratio: 1 / 1; max-height: 300px;
  background: var(--s1); border: 1px solid var(--s3); border-radius: var(--rl);
  overflow: hidden; position: relative; margin-bottom: 12px;
}
#cam-video { width: 100%; height: 100%; object-fit: cover; display: block; }
.cam-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
.cam-finder {
  width: 180px; height: 180px; position: relative;
  box-shadow: 0 0 0 9999px rgba(6,6,8,0.5);
}
/* Corner brackets */
.cam-finder::before, .cam-finder::after,
.cam-finder .c1::before, .cam-finder .c1::after {
  content: ''; position: absolute; width: 22px; height: 22px; border-color: var(--lime); border-style: solid;
}
.cam-finder::before  { top: 0;    left: 0;   border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
.cam-finder::after   { top: 0;    right: 0;  border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
.cam-finder .c1::before { bottom: 0; left: 0;   border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
.cam-finder .c1::after  { bottom: 0; right: 0;  border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }
.scan-line {
  position: absolute; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--lime), transparent);
  top: 0; animation: scanMove 2s ease-in-out infinite;
}
@keyframes scanMove { 0% { top: 5%; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { top: 95%; opacity: 0; } }
.cam-placeholder {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; color: var(--muted);
}
.cam-placeholder p { font-size: 13px; }

/* ── RESULT CARD ── */
.result-card {
  margin-top: 24px; border-radius: var(--rl); padding: 32px 24px;
  text-align: center; border: 1px solid var(--s3); background: var(--s1);
  display: none;
}
.result-card.show { display: block; animation: fadeUp 0.3s ease both; }

.tick-wrap {
  width: 80px; height: 80px; position: relative; margin: 0 auto 20px;
}
.tick-ring {
  position: absolute; top: 0; left: 0; width: 80px; height: 80px;
  transform: rotate(-90deg);
}
.ring-bg   { fill: none; stroke: var(--s3); stroke-width: 3; }
.ring-prog {
  fill: none; stroke-width: 3; stroke-linecap: round;
  stroke-dasharray: 220; stroke-dashoffset: 220;
  transition: stroke-dashoffset 0.55s ease, stroke 0.2s;
}
.tick-icon {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
}
.tick-icon svg {
  width: 34px; height: 34px; fill: none;
  stroke-width: 3.5; stroke-linecap: round; stroke-linejoin: round;
  stroke-dasharray: 100; stroke-dashoffset: 100;
  transition: stroke-dashoffset 0.35s ease 0.5s, stroke 0.2s;
}

.result-status { font-family: 'Unbounded', sans-serif; font-size: 9px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 8px; }
.result-name   { font-family: 'Unbounded', sans-serif; font-weight: 700; font-size: 32px; letter-spacing: -0.5px; line-height: 1.1; color: var(--white); margin-bottom: 6px; }
.result-id     { font-size: 10px; letter-spacing: 2px; color: var(--muted); font-family: 'Unbounded', sans-serif; margin-bottom: 16px; }
.result-badge  { display: inline-flex; align-items: center; gap: 6px; font-family: 'Unbounded', sans-serif; font-size: 9px; letter-spacing: 2px; padding: 6px 16px; border-radius: 40px; margin-bottom: 20px; }
.badge-ok   { background: rgba(0,229,160,0.1);  border: 1px solid rgba(0,229,160,0.25);  color: var(--success); }
.badge-bad  { background: rgba(255,45,107,0.1);  border: 1px solid rgba(255,45,107,0.25);  color: var(--pink); }
.badge-warn { background: rgba(255,170,0,0.1);   border: 1px solid rgba(255,170,0,0.25);   color: var(--warning); }
.result-actions { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
.s-ok   { color: var(--success); }
.s-bad  { color: var(--pink); }
.s-warn { color: var(--warning); }

/* ── GUESTS PANEL ── */
.guests-panel { padding: 24px; }
.guests-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
.guests-search {
  width: 100%; max-width: 280px; background: var(--s1); border: 1px solid var(--s3);
  color: var(--white); padding: 10px 16px; border-radius: 40px;
  font-family: 'Syne', sans-serif; font-size: 13px; outline: none; transition: border-color 0.2s;
}
.guests-search:focus { border-color: var(--lime); }
.guests-search::placeholder { color: var(--muted); }
.stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
.stat-card { background: var(--s1); border: 1px solid var(--s3); border-radius: var(--r); padding: 16px; text-align: center; }
.stat-num { font-family: 'Unbounded', sans-serif; font-weight: 700; font-size: 26px; letter-spacing: -1px; margin-bottom: 4px; }
.n-lime  { color: var(--lime); }
.n-green { color: var(--success); }
.n-red   { color: var(--pink); }
.stat-label { font-size: 9px; color: var(--muted2); font-family: 'Unbounded', sans-serif; letter-spacing: 1.5px; text-transform: uppercase; }
.guest-list { display: flex; flex-direction: column; gap: 8px; }
.guest-row {
  display: flex; align-items: center; gap: 12px;
  background: var(--s1); border: 1px solid var(--s3); border-radius: var(--r);
  padding: 12px 16px; transition: border-color 0.2s;
}
.guest-row:hover { border-color: var(--s4); }
.guest-row.g-checkedin { border-left: 3px solid var(--success); }
.guest-row.g-locked    { border-left: 3px solid var(--pink); opacity: 0.75; }
.guest-avatar {
  width: 36px; height: 36px; flex-shrink: 0; border-radius: 50%;
  background: var(--s3); display: flex; align-items: center; justify-content: center;
  font-family: 'Unbounded', sans-serif; font-size: 10px; font-weight: 700; color: var(--muted2);
}
.guest-info { flex: 1; min-width: 0; }
.guest-name { font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
.guest-meta { font-family: 'Unbounded', sans-serif; font-size: 8px; letter-spacing: 1.5px; color: var(--muted); }
.guest-status { flex-shrink: 0; font-family: 'Unbounded', sans-serif; font-size: 8px; letter-spacing: 1.5px; padding: 5px 10px; border-radius: 20px; text-transform: uppercase; }
.gs-active    { background: rgba(212,255,0,0.08);  color: var(--lime);    border: 1px solid rgba(212,255,0,0.2); }
.gs-checkedin { background: rgba(0,229,160,0.08);  color: var(--success); border: 1px solid rgba(0,229,160,0.2); }
.gs-locked    { background: rgba(255,45,107,0.08); color: var(--pink);    border: 1px solid rgba(255,45,107,0.2); }
.guest-actions { display: flex; gap: 6px; flex-shrink: 0; }
.icon-btn {
  width: 32px; height: 32px; border-radius: 8px; background: var(--s2);
  border: 1px solid var(--s3); color: var(--muted2);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.15s; flex-shrink: 0;
}
.icon-btn:hover { background: var(--s4); color: var(--white); }
.icon-btn.ib-danger:hover  { background: rgba(255,45,107,0.15); color: var(--pink);    border-color: rgba(255,45,107,0.3); }
.icon-btn.ib-success:hover { background: rgba(0,229,160,0.12);  color: var(--success); border-color: rgba(0,229,160,0.25); }
.empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
.empty-state .big { font-size: 40px; margin-bottom: 12px; }
.spinner { width: 24px; height: 24px; border: 2px solid var(--s3); border-top-color: var(--lime); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 40px auto; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- ═══ LOGIN ═══ -->
<div class="screen active" id="s-login">
  <div class="login-box fadein">
    <div class="wordmark">Disco<span>Pass</span></div>
    <div class="admin-chip">Admin Panel</div>
    <h1 class="login-title">Staff Access</h1>
    <p class="login-sub">Enter the admin password to continue.</p>
    <label class="form-label" for="pw-input">Password</label>
    <input class="form-input" id="pw-input" type="password" placeholder="••••••••" autocomplete="current-password">
    <button class="btn btn-lime" id="login-btn">Enter →</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ═══ ADMIN ═══ -->
<div class="screen" id="s-admin">

  <div class="admin-header">
    <div class="header-logo">Disco<span>Pass</span> <span style="font-size:8px;letter-spacing:2px;color:var(--muted2);font-weight:300">ADMIN</span></div>
    <div class="header-right">
      <div id="live-count"></div>
      <button class="logout-btn" id="logout-btn">Log Out</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="scan">Scan</button>
    <button class="tab"        data-tab="guests">Guests</button>
  </div>

  <!-- SCAN TAB -->
  <div class="tab-panel active" id="tab-scan">
    <div class="scan-panel">

      <div class="section-title">Camera Scan</div>
      <div class="camera-wrap" id="camera-wrap">
        <video id="cam-video" autoplay playsinline muted></video>
        <div class="cam-overlay">
          <div class="cam-finder">
            <div class="c1"></div>
            <div class="scan-line"></div>
          </div>
        </div>
        <div class="cam-placeholder" id="cam-placeholder">
          <svg width="38" height="38" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" style="opacity:.4">
            <path d="M3 7V5a2 2 0 012-2h2M17 3h2a2 2 0 012 2v2M21 17v2a2 2 0 01-2 2h-2M7 21H5a2 2 0 01-2-2v-2"/>
            <rect x="7" y="7" width="4" height="4" rx="1"/><rect x="13" y="7" width="4" height="4" rx="1"/>
            <rect x="7" y="13" width="4" height="4" rx="1"/><rect x="13" y="13" width="4" height="4" rx="1" opacity=".4"/>
          </svg>
          <p>Tap to start camera</p>
        </div>
      </div>
      <button class="btn btn-outline" id="cam-btn" style="margin-bottom:0">Start Camera</button>

      <div class="or">or</div>

      <div class="section-title">Manual Entry</div>
      <div class="manual-row">
        <input class="form-input" id="manual-input" type="text" placeholder="PASS-XXXXXX"
          autocomplete="off" spellcheck="false" autocorrect="off" autocapitalize="characters">
        <button class="btn btn-lime btn-sm" id="manual-btn">Check</button>
      </div>

      <!-- RESULT -->
      <div class="result-card" id="result-card">
        <div class="tick-wrap">
          <svg class="tick-ring" viewBox="0 0 80 80">
            <circle class="ring-bg"   cx="40" cy="40" r="35"/>
            <circle class="ring-prog" cx="40" cy="40" r="35" id="ring-prog"/>
          </svg>
          <div class="tick-icon">
            <svg id="tick-icon-svg" viewBox="0 0 24 24"></svg>
          </div>
        </div>
        <div class="result-status"  id="res-status"></div>
        <div class="result-name"    id="res-name"></div>
        <div class="result-id"      id="res-id"></div>
        <div class="result-badge"   id="res-badge"></div>
        <div class="result-actions" id="res-actions"></div>
      </div>

    </div>
  </div>

  <!-- GUESTS TAB -->
  <div class="tab-panel" id="tab-guests">
    <div class="guests-panel">
      <div class="guests-header">
        <div>
          <div style="font-family:'Unbounded',sans-serif;font-weight:700;font-size:22px;letter-spacing:-0.5px;margin-bottom:4px">Guests</div>
          <div style="font-size:12px;color:var(--muted2)">All registered passes</div>
        </div>
        <input class="guests-search" id="guest-search" type="text" placeholder="Search name or ID…">
      </div>
      <div class="stats-row" id="stats-row"></div>
      <div class="guest-list" id="guest-list"></div>
      <div class="empty-state" id="empty-state" style="display:none">
        <div class="big">🎟</div>
        <div style="font-size:13px">No guests registered yet.</div>
      </div>
    </div>
  </div>

</div>

<canvas id="qr-canvas" style="display:none"></canvas>

<script>
// ── CONFIG ──
const ADMIN_PW     = 'esak786';
const SUPABASE_URL = 'https://nwzhtjfdywxdbnrcvlcx.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im53emh0amZkeXd4ZGJuY3J2bGN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwMTY2NjIsImV4cCI6MjA5MDU5MjY2Mn0.VjZzVvl8x1y-FuUHXF5tedVWMb4phaYaRr8HQy7L5eQ';
const H = {
  'Content-Type': 'application/json',
  'Accept': 'application/json',
  'apikey': SUPABASE_KEY,
  'Authorization': 'Bearer ' + SUPABASE_KEY
};

// ── DB ──
async function dbGet(id) {
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/passes?id=eq.${encodeURIComponent(id)}&select=*`, { headers: H });
    if (!r.ok) return null;
    const d = await r.json();
    return Array.isArray(d) && d.length ? d[0] : null;
  } catch { return null; }
}

async function dbAll() {
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/passes?select=*&order=created_at.desc`, { headers: H });
    if (!r.ok) return [];
    const d = await r.json();
    return Array.isArray(d) ? d : [];
  } catch { return []; }
}

async function dbUpdate(id, fields) {
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/passes?id=eq.${encodeURIComponent(id)}`, {
      method: 'PATCH',
      headers: { ...H, 'Prefer': 'return=minimal' },
      body: JSON.stringify(fields)
    });
  } catch(e) { console.error('dbUpdate error', e); }
}

// ── AUTH ──
document.getElementById('login-btn').addEventListener('click', doLogin);
document.getElementById('pw-input').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

function doLogin() {
  const val = document.getElementById('pw-input').value;
  if (val === ADMIN_PW) {
    document.getElementById('s-login').classList.remove('active');
    document.getElementById('s-admin').classList.add('active', 'fadein');
    document.getElementById('login-error').textContent = '';
    document.getElementById('pw-input').value = '';
    startAdmin();
  } else {
    document.getElementById('login-error').textContent = 'Incorrect password.';
    document.getElementById('pw-input').classList.add('shake');
    setTimeout(() => document.getElementById('pw-input').classList.remove('shake'), 400);
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}

document.getElementById('logout-btn').addEventListener('click', () => {
  stopCamera();
  clearInterval(refreshTimer);
  refreshTimer = null;
  document.getElementById('s-admin').classList.remove('active', 'fadein');
  document.getElementById('s-login').classList.add('active');
  document.getElementById('result-card').classList.remove('show');
  document.getElementById('pw-input').focus();
});

// ── TABS ──
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    const name = tab.dataset.tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'tab-' + name));
    if (name === 'guests') renderGuests();
  });
});

// ── CAMERA ──
let stream = null, scanLoop = null, cameraOn = false;

document.getElementById('cam-btn').addEventListener('click', toggleCamera);

async function toggleCamera() {
  if (cameraOn) { stopCamera(); return; }
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: 'environment' } } });
    const video = document.getElementById('cam-video');
    video.srcObject = stream;
    await video.play();
    document.getElementById('cam-placeholder').style.display = 'none';
    document.getElementById('cam-btn').textContent = 'Stop Camera';
    cameraOn = true;
    startScanLoop();
  } catch(e) {
    alert('Camera access denied or unavailable. Please allow camera permissions in your browser settings.');
  }
}

function stopCamera() {
  if (scanLoop) { clearInterval(scanLoop); scanLoop = null; }
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  const video = document.getElementById('cam-video');
  video.srcObject = null;
  document.getElementById('cam-placeholder').style.display = 'flex';
  document.getElementById('cam-btn').textContent = 'Start Camera';
  cameraOn = false;
}

function startScanLoop() {
  const video  = document.getElementById('cam-video');
  const canvas = document.getElementById('qr-canvas');
  const ctx    = canvas.getContext('2d');
  let lastId   = '';
  let cooldown = false;

  scanLoop = setInterval(() => {
    if (!video.videoWidth || video.paused || video.ended) return;
    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);
    const img  = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(img.data, img.width, img.height, { inversionAttempts: 'dontInvert' });
    if (code && code.data && !cooldown) {
      const id = extractId(code.data.trim().toUpperCase());
      if (id && id !== lastId) {
        lastId = id; cooldown = true;
        setTimeout(() => { cooldown = false; lastId = ''; }, 3500);
        processPass(id);
      }
    }
  }, 300);
}

function extractId(raw) {
  const m = raw.match(/PASS-[A-Z0-9]{6}/);
  return m ? m[0] : null;
}

// ── MANUAL ──
document.getElementById('manual-btn').addEventListener('click', manualVerify);
document.getElementById('manual-input').addEventListener('keydown', e => { if (e.key === 'Enter') manualVerify(); });
document.getElementById('manual-input').addEventListener('input', function () {
  const m = this.value.toUpperCase().match(/PASS-?([A-Z0-9]{6})/);
  if (m) this.value = 'PASS-' + m[1];
  else this.value = this.value.toUpperCase().replace(/[^A-Z0-9-]/g, '');
});

function manualVerify() {
  const raw = document.getElementById('manual-input').value.trim().toUpperCase();
  const id  = extractId(raw) || (raw.length > 4 ? raw : null);
  if (!id) return;
  document.getElementById('manual-input').value = '';
  processPass(id);
}

// ── PROCESS PASS ──
async function processPass(passId) {
  const card = document.getElementById('result-card');
  // Reset animation
  card.classList.remove('show');
  void card.offsetWidth;

  const pass = await dbGet(passId);

  if (!pass) {
    showResult({ type: 'bad', status: 'Unknown Pass', name: 'Not Found', id: passId, badge: 'No Record', currentStatus: null });
    return;
  }

  if (pass.status === 'locked') {
    showResult({ type: 'bad', status: 'Access Denied', name: pass.name, id: passId, badge: 'Pass Locked', currentStatus: 'locked' });
    return;
  }

  if (pass.status === 'checkedin') {
    showResult({ type: 'warn', status: 'Already Checked In', name: pass.name, id: passId, badge: 'Duplicate Scan', currentStatus: 'checkedin' });
    return;
  }

  // Check in now
  await dbUpdate(passId, { status: 'checkedin', checked_in_at: new Date().toISOString() });
  updateLiveCount();
  showResult({ type: 'ok', status: 'Verified', name: pass.name, id: passId, badge: 'Entry Granted', currentStatus: 'checkedin' });
}

// Store last shown passId so action buttons can reference it
let lastPassId = null;

function showResult({ type, status, name, id, badge, currentStatus }) {
  lastPassId = id;

  const colors = { ok: 'var(--success)', bad: 'var(--pink)', warn: 'var(--warning)' };
  const c = colors[type];

  // Ring
  const prog = document.getElementById('ring-prog');
  prog.style.stroke = c;
  prog.style.transition = 'none';
  prog.style.strokeDashoffset = '220';
  void prog.offsetWidth;
  prog.style.transition = 'stroke-dashoffset 0.55s ease';
  prog.style.strokeDashoffset = '0';

  // Icon
  const iconSvg = document.getElementById('tick-icon-svg');
  iconSvg.style.stroke = c;
  iconSvg.style.transition = 'none';
  iconSvg.style.strokeDashoffset = '100';
  if (type === 'ok') {
    iconSvg.innerHTML = '<polyline points="20 6 9 17 4 12"/>';
  } else if (type === 'bad') {
    iconSvg.innerHTML = '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>';
  } else {
    iconSvg.innerHTML = '<circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="13"/><line x1="12" y1="16" x2="12.01" y2="16"/>';
  }
  void iconSvg.offsetWidth;
  iconSvg.style.transition = 'stroke-dashoffset 0.35s ease 0.5s';
  iconSvg.style.strokeDashoffset = '0';

  // Text
  const sc = { ok: 's-ok', bad: 's-bad', warn: 's-warn' }[type];
  const bc = { ok: 'badge-ok', bad: 'badge-bad', warn: 'badge-warn' }[type];
  document.getElementById('res-status').className = 'result-status ' + sc;
  document.getElementById('res-status').textContent = status;
  document.getElementById('res-name').textContent   = name;
  document.getElementById('res-id').textContent     = id;
  document.getElementById('res-badge').className    = 'result-badge ' + bc;
  document.getElementById('res-badge').innerHTML    = `<svg width="8" height="8" viewBox="0 0 8 8" fill="${c}"><circle cx="4" cy="4" r="4"/></svg> ${badge}`;

  // Action buttons — use data attributes, not inline JS with closures
  const actionsEl = document.getElementById('res-actions');
  actionsEl.innerHTML = '';

  if (currentStatus === 'locked') {
    const btn = makeBtn('btn-outline btn-sm', 'Unlock Pass', 'unlock', id);
    actionsEl.appendChild(btn);
  } else if (currentStatus === 'checkedin') {
    const btn = makeBtn('btn-outline btn-sm', 'Reset Check-in', 'reset', id);
    actionsEl.appendChild(btn);
  } else if (currentStatus === 'checkedin' || type === 'ok') {
    const b1 = makeBtn('btn-danger btn-sm', 'Lock Pass', 'lock', id);
    const b2 = makeBtn('btn-outline btn-sm', 'Reset', 'reset', id);
    actionsEl.appendChild(b1);
    actionsEl.appendChild(b2);
  }

  // For ok (just checked in) show lock + reset
  if (type === 'ok') {
    actionsEl.innerHTML = '';
    actionsEl.appendChild(makeBtn('btn-danger btn-sm', 'Lock Pass', 'lock', id));
    actionsEl.appendChild(makeBtn('btn-outline btn-sm', 'Reset', 'reset', id));
  }

  document.getElementById('result-card').classList.add('show');
}

function makeBtn(classes, label, action, passId) {
  const btn = document.createElement('button');
  btn.className = 'btn ' + classes;
  btn.textContent = label;
  btn.dataset.action = action;
  btn.dataset.passId = passId;
  btn.addEventListener('click', handleResultAction);
  return btn;
}

async function handleResultAction(e) {
  const { action, passId } = e.currentTarget.dataset;
  if (action === 'lock')    await dbUpdate(passId, { status: 'locked' });
  if (action === 'unlock')  await dbUpdate(passId, { status: 'active', checked_in_at: null });
  if (action === 'reset')   await dbUpdate(passId, { status: 'active', checked_in_at: null });
  processPass(passId);
  updateLiveCount();
}

// ── GUESTS ──
document.getElementById('guest-search').addEventListener('input', renderGuests);

async function renderGuests() {
  const list = document.getElementById('guest-list');
  list.innerHTML = '<div class="spinner"></div>';

  const passes  = await dbAll();
  const q       = document.getElementById('guest-search').value.toLowerCase();
  const filtered = passes.filter(p =>
    p.name.toLowerCase().includes(q) || p.id.toLowerCase().includes(q)
  );

  const total   = passes.length;
  const checked = passes.filter(p => p.status === 'checkedin').length;
  const locked  = passes.filter(p => p.status === 'locked').length;

  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card"><div class="stat-num n-lime">${total}</div><div class="stat-label">Registered</div></div>
    <div class="stat-card"><div class="stat-num n-green">${checked}</div><div class="stat-label">Checked In</div></div>
    <div class="stat-card"><div class="stat-num n-red">${locked}</div><div class="stat-label">Locked</div></div>`;

  if (total === 0) {
    list.innerHTML = '';
    document.getElementById('empty-state').style.display = 'block';
    return;
  }
  document.getElementById('empty-state').style.display = 'none';

  if (filtered.length === 0) {
    list.innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted);font-size:13px">No results found.</div>';
    return;
  }

  list.innerHTML = '';
  filtered.forEach(p => {
    const initials = p.name.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();
    const rowClass = p.status === 'checkedin' ? 'g-checkedin' : p.status === 'locked' ? 'g-locked' : '';
    const sc = p.status === 'checkedin' ? 'gs-checkedin' : p.status === 'locked' ? 'gs-locked' : 'gs-active';
    const sl = p.status === 'checkedin' ? 'Checked In' : p.status === 'locked' ? 'Locked' : 'Active';

    const row = document.createElement('div');
    row.className = 'guest-row ' + rowClass;
    row.innerHTML = `
      <div class="guest-avatar">${initials}</div>
      <div class="guest-info">
        <div class="guest-name">${p.name}</div>
        <div class="guest-meta">${p.id}</div>
      </div>
      <div class="guest-status ${sc}">${sl}</div>
      <div class="guest-actions"></div>`;

    const actions = row.querySelector('.guest-actions');

    // Reset button (only if checked in)
    if (p.status === 'checkedin') {
      const resetBtn = document.createElement('button');
      resetBtn.className = 'icon-btn';
      resetBtn.title = 'Reset check-in';
      resetBtn.innerHTML = `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>`;
      resetBtn.addEventListener('click', async () => {
        await dbUpdate(p.id, { status: 'active', checked_in_at: null });
        renderGuests(); updateLiveCount();
      });
      actions.appendChild(resetBtn);
    }

    // Lock / Unlock button
    if (p.status === 'locked') {
      const unlockBtn = document.createElement('button');
      unlockBtn.className = 'icon-btn ib-success';
      unlockBtn.title = 'Unlock pass';
      unlockBtn.innerHTML = `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 019.9-1"/></svg>`;
      unlockBtn.addEventListener('click', async () => {
        await dbUpdate(p.id, { status: 'active', checked_in_at: null });
        renderGuests(); updateLiveCount();
      });
      actions.appendChild(unlockBtn);
    } else {
      const lockBtn = document.createElement('button');
      lockBtn.className = 'icon-btn ib-danger';
      lockBtn.title = 'Lock pass';
      lockBtn.innerHTML = `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>`;
      lockBtn.addEventListener('click', async () => {
        await dbUpdate(p.id, { status: 'locked' });
        renderGuests(); updateLiveCount();
      });
      actions.appendChild(lockBtn);
    }

    list.appendChild(row);
  });
}

// ── LIVE COUNT ──
async function updateLiveCount() {
  const passes  = await dbAll();
  const checked = passes.filter(p => p.status === 'checkedin').length;
  document.getElementById('live-count').textContent = `${checked} / ${passes.length} in`;
}

// ── INIT ──
let refreshTimer = null;

function startAdmin() {
  updateLiveCount();
  if (refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(updateLiveCount, 15000);
}
</script>
